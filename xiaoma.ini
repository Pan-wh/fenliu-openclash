port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090
proxy-providers:
  Provider_36CE12:
    type: http
    url: "机场 URL"
    interval: 3600
    proxy: DIRECT
    path: ./providers/Provider_36CE12.yaml
    exclude-filter: (?i)(流量|套餐|到期|剩余|重置|官网|网站|最新网址|防失联|失联|官网地址|公告|通知|TG|Telegram|电报|群|频道|说明|使用说明|QQ群|客服|工单|订阅|Expire|Traffic|Reset|Remaining|Expire|Official|Website)|(到期)|(流量)|(套餐)|(官网)
    health-check:
      enable: true
      url: https://cp.cloudflare.com/generate_204
      interval: 300
    override:
      skip-cert-verify: true
      udp: true

